name: Chromium Release

on:
  push:
    branches:
      - main
    paths:
      - "artifacts/latest/build.json"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: chromium-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y jq curl unzip

      # Read metadata
      - name: Read build metadata
        id: meta
        run: |
          VERSION=$(jq -r '.version' artifacts/latest/build.json)
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      # Get latest release commit
      - name: Get latest release commit
        id: latest
        run: |
          LATEST=$(gh release view --json body -q '.body' 2>/dev/null | grep -o '[a-f0-9]\{40\}' | head -n1 || echo "")

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Compare commits
      - name: Compare commits
        id: compare
        run: |
          if [ "${{ steps.meta.outputs.commit }}" = "${{ steps.latest.outputs.latest }}" ]; then
            echo "same=true" >> $GITHUB_OUTPUT
          else
            echo "same=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if commit unchanged
        if: steps.compare.outputs.same == 'true'
        run: |
          echo "Commit already released. Skipping."
          exit 0

      # Get Chromium snapshot versions
      - name: Get snapshot versions
        id: snapshot
        run: |
          LINUX=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/LAST_CHANGE)
          MAC=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/LAST_CHANGE)
          WIN=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/LAST_CHANGE)

          echo "linux=$LINUX" >> $GITHUB_OUTPUT
          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "win=$WIN" >> $GITHUB_OUTPUT

      # Download builds
      - name: Download Linux build
        run: |
          curl -L -o chromium-linux.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/${{ steps.snapshot.outputs.linux }}/chrome-linux.zip

      - name: Download macOS build
        run: |
          curl -L -o chromium-macos.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/${{ steps.snapshot.outputs.mac }}/chrome-mac.zip

      - name: Download Windows build
        run: |
          curl -L -o chromium-win.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/${{ steps.snapshot.outputs.win }}/chrome-win.zip

      - name: Prepare artifacts
        run: |
          mkdir release
          mv chromium-linux.zip release/
          mv chromium-macos.zip release/
          mv chromium-win.zip release/

      # Create release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chromium-${{ steps.meta.outputs.version }}
          name: Chromium ${{ steps.meta.outputs.version }}
          body: |
            Chromium ${{ steps.meta.outputs.version }}

            Commit: ${{ steps.meta.outputs.commit }}

            Platforms:
            - Linux
            - macOS
            - Windows
          files: release/*
