name: Chromium Nightly Release

on:
  push:
    paths:
      - "artifacts/latest/build.json"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: chromium-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y jq curl unzip

      # Read commit info
      - name: Read build metadata
        id: meta
        run: |
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          AUTHOR=$(jq -r '.author' artifacts/latest/build.json)
          DATE=$(jq -r '.commit_time' artifacts/latest/build.json)

          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      # Prevent duplicate releases
      - name: Check if release already exists
        id: check
        run: |
          TAG="chromium-${{ steps.meta.outputs.commit }}"
          EXISTS=$(gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1 && echo "yes" || echo "no")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop if release exists
        if: steps.check.outputs.exists == 'yes'
        run: |
          echo "Release already exists. Skipping."
          exit 0

      # Get latest snapshot numbers
      - name: Fetch Chromium snapshot versions
        id: snapshot
        run: |
          LINUX=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/LAST_CHANGE)
          MAC=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/LAST_CHANGE)
          WIN=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/LAST_CHANGE)

          echo "linux=$LINUX" >> $GITHUB_OUTPUT
          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "win=$WIN" >> $GITHUB_OUTPUT

      # Download builds
      - name: Download Linux build
        run: |
          curl -L -o chromium-linux.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/${{ steps.snapshot.outputs.linux }}/chrome-linux.zip

      - name: Download macOS build
        run: |
          curl -L -o chromium-macos.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/${{ steps.snapshot.outputs.mac }}/chrome-mac.zip

      - name: Download Windows build
        run: |
          curl -L -o chromium-win.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/${{ steps.snapshot.outputs.win }}/chrome-win.zip

      - name: Prepare artifacts
        run: |
          mkdir release
          mv chromium-linux.zip release/
          mv chromium-macos.zip release/
          mv chromium-win.zip release/

      # Publish release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chromium-${{ steps.meta.outputs.commit }}
          name: Chromium Nightly ${{ steps.meta.outputs.commit }}
          body: |
            Chromium nightly build

            Commit: ${{ steps.meta.outputs.commit }}
            Author: ${{ steps.meta.outputs.author }}
            Commit Time: ${{ steps.meta.outputs.date }}

            Builds:
            - Linux
            - macOS
            - Windows
          files: release/*
