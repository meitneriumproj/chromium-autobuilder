name: Chromium Release

on:
  workflow_run:
    workflows: ["Chromium Update Tracker"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: chromium-release
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y jq curl unzip gh

      # Read metadata from build.json
      - name: Read metadata
        id: meta
        run: |
          VERSION=$(jq -r '.version' artifacts/latest/build.json)
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          AUTHOR=$(jq -r '.author' artifacts/latest/build.json)
          TIME=$(jq -r '.commit_time' artifacts/latest/build.json)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT

      # Check latest release commit
      - name: Check latest release
        id: check
        run: |
          LAST=$(gh release view --json body -q '.body' 2>/dev/null | grep -o '[a-f0-9]\{40\}' | head -n1 || echo "")

          echo "latest=$LAST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stop if commit already released
      - name: Skip if already released
        if: steps.meta.outputs.commit == steps.check.outputs.latest
        run: |
          echo "Commit already released. Skipping."
          exit 0

      # Fetch Chromium snapshot versions
      - name: Get snapshot versions
        id: snap
        run: |
          LINUX=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/LAST_CHANGE)
          MAC=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/LAST_CHANGE)
          WIN=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/LAST_CHANGE)

          echo "linux=$LINUX" >> $GITHUB_OUTPUT
          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "win=$WIN" >> $GITHUB_OUTPUT

      # Download Chromium builds
      - name: Download Linux build
        run: |
          curl -L -o chromium-linux.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Linux_x64/${{ steps.snap.outputs.linux }}/chrome-linux.zip

      - name: Download macOS build
        run: |
          curl -L -o chromium-macos.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Mac/${{ steps.snap.outputs.mac }}/chrome-mac.zip

      - name: Download Windows build
        run: |
          curl -L -o chromium-win.zip \
          https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/${{ steps.snap.outputs.win }}/chrome-win.zip

      # Prepare release files
      - name: Prepare artifacts
        run: |
          mkdir release
          mv chromium-linux.zip release/
          mv chromium-macos.zip release/
          mv chromium-win.zip release/

      # Publish release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chromium-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.commit }}
          name: Chromium Nightly Build ${{ steps.meta.outputs.version }} ${{ steps.meta.outputs.commit }}
          body: |
            Chromium Nightly Build ${{ steps.meta.outputs.version }} ${{ steps.meta.outputs.commit }}

            Commit: ${{ steps.meta.outputs.commit }}
            Author: ${{ steps.meta.outputs.author }}
            Commit Time: ${{ steps.meta.outputs.time }}

            Platforms:
            - Linux
            - macOS
            - Windows
          files: release/*
