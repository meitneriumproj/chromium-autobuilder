name: Chromium Nightly Release

on:
  push:
    paths:
      - "artifacts/latest/build.json"

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y git clang ninja-build python3 jq curl

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja jq

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja jq -y

      - name: Read build metadata
        id: meta
        shell: bash
        run: |
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Clone Chromium
        shell: bash
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/src chromium
          cd chromium
          git fetch --depth 1 origin ${{ steps.meta.outputs.commit }}
          git checkout ${{ steps.meta.outputs.commit }}

      - name: Generate build
        shell: bash
        run: |
          cd chromium
          gn gen out/Release

      - name: Build Chromium
        shell: bash
        run: |
          cd chromium
          ninja -C out/Release chrome

      - name: Package build
        shell: bash
        run: |
          mkdir dist

          if [ "$RUNNER_OS" = "Linux" ]; then
            tar -cJf dist/chromium-linux.tar.xz -C chromium/out/Release chrome
          fi

          if [ "$RUNNER_OS" = "macOS" ]; then
            tar -cJf dist/chromium-macos.tar.xz -C chromium/out/Release chrome
          fi

          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell Compress-Archive chromium/out/Release/chrome.exe dist/chromium-win.zip
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ runner.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chromium-${{ steps.meta.outputs.commit }}
          name: Chromium Nightly ${{ steps.meta.outputs.commit }}
          body: |
            Automated Chromium nightly build
            Commit: ${{ steps.meta.outputs.commit }}
          files: release/**/*
