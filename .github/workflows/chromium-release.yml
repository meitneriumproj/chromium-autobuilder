name: Chromium Nightly Release

on:
  schedule:
    - cron: "0 3 * * *"   # once per day (03:00 UTC)
  workflow_dispatch:
  push:
    paths:
      - "artifacts/latest/build.json"

permissions:
  contents: write

# Prevent multiple builds at the same time
concurrency:
  group: chromium-build
  cancel-in-progress: false

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y git python3 ninja-build clang jq curl ccache

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja jq ccache

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja jq -y

      - name: Read build metadata
        id: meta
        shell: bash
        run: |
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_check
        shell: bash
        run: |
          TAG="chromium-${{ steps.meta.outputs.commit }}"
          EXISTS=$(gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1 && echo "yes" || echo "no")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop if release exists
        if: steps.release_check.outputs.exists == 'yes'
        run: |
          echo "Release already exists, skipping build."
          exit 0

      - name: Install depot_tools
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch Chromium
        shell: bash
        run: |
          fetch --nohooks chromium
          cd src
          git fetch --depth 1 origin ${{ steps.meta.outputs.commit }}
          git checkout ${{ steps.meta.outputs.commit }}

      - name: Generate build
        shell: bash
        run: |
          cd src
          gn gen out/Release --args="is_debug=false use_ccache=true"

      - name: Build Chromium
        shell: bash
        run: |
          cd src
          ninja -C out/Release chrome -j$(nproc || sysctl -n hw.ncpu)

      - name: Package build
        shell: bash
        run: |
          mkdir dist

          if [ "$RUNNER_OS" = "Linux" ]; then
            tar -cJf dist/chromium-linux.tar.xz -C src/out/Release chrome
          fi

          if [ "$RUNNER_OS" = "macOS" ]; then
            tar -cJf dist/chromium-macos.tar.xz -C src/out/Release chrome
          fi

          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell Compress-Archive src/out/Release/chrome.exe dist/chromium-win.zip
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ runner.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          COMMIT=$(jq -r '.commit' artifacts/latest/build.json)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chromium-${{ steps.meta.outputs.commit }}
          name: Chromium Nightly ${{ steps.meta.outputs.commit }}
          body: |
            Automated Chromium nightly build

            Commit: ${{ steps.meta.outputs.commit }}
          files: release/**/*
