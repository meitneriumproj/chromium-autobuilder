name: Chromium Update Tracker

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-chromium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y jq curl git

      - name: Fetch latest commit
        id: chromium
        run: |
          RESPONSE=$(curl -s https://chromium.googlesource.com/chromium/src/+log/main?format=JSON)
          JSON=$(echo "$RESPONSE" | sed '1d')

          COMMIT=$(echo "$JSON" | jq -r '.log[0].commit')
          AUTHOR=$(echo "$JSON" | jq -r '.log[0].author.name')
          DATE=$(echo "$JSON" | jq -r '.log[0].committer.time')

          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Fetch Chromium version
        id: version
        run: |
          curl -s https://chromium.googlesource.com/chromium/src/+/main/chrome/VERSION?format=TEXT \
          | base64 --decode > VERSION

          MAJOR=$(grep MAJOR VERSION | cut -d= -f2)
          MINOR=$(grep MINOR VERSION | cut -d= -f2)
          BUILD=$(grep BUILD VERSION | cut -d= -f2)
          PATCH=$(grep PATCH VERSION | cut -d= -f2)

          VERSION="$MAJOR.$MINOR.$BUILD.$PATCH"

          echo "Detected version: $VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read current commit
        id: current
        run: |
          if [ -f artifacts/latest/build.json ]; then
            CURRENT=$(jq -r '.commit' artifacts/latest/build.json)
          else
            CURRENT=""
          fi

          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update metadata
        if: steps.chromium.outputs.commit != steps.current.outputs.current
        run: |
          mkdir -p artifacts/latest

          cat > artifacts/latest/build.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit": "${{ steps.chromium.outputs.commit }}",
            "author": "${{ steps.chromium.outputs.author }}",
            "commit_time": "${{ steps.chromium.outputs.date }}",
            "status": "new"
          }
          EOF

      - name: Commit update
        if: steps.chromium.outputs.commit != steps.current.outputs.current
        run: |
          git config user.name "chromium-bot"
          git config user.email "actions@github.com"

          git add artifacts/latest/build.json
          git commit -m "Chromium ${{ steps.version.outputs.version }} update"
          git push
